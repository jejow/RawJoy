<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - RawJoy</title>
  <link rel="stylesheet" href="../../css/theme.css">
  <link rel="stylesheet" href="../../css/db-ui.css">
  <style>
    body {
      background-color: #FAF6F2; /* Premium sand background light */
      font-family: 'Poppins', 'Outfit', 'Inter', sans-serif;
      margin: 0;
      color: #232323;
    }
    
    .checkout-nav {
      background: #FFFFFF;
      padding: 16px 40px;
      box-shadow: 0 4px 25px rgba(35, 35, 35, 0.03);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      border-bottom: 1.5px solid #E5E5E5;
    }
    
    @media (max-width: 768px) {
      .checkout-nav {
        padding: 16px 20px;
        grid-template-columns: auto 1fr;
      }
      .nav-spacer {
        display: none;
      }
    }
    
    .back-to-shop {
      color: #5A7F71; /* Sage Green */
      text-decoration: none;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      width: fit-content;
    }
    
    .back-to-shop:hover {
      color: #D36B50; /* Terracotta */
      transform: translateX(-4px);
    }
    
    .brand-logo {
      height: 42px;
      display: block;
    }
    
    .nav-spacer {
      justify-self: end;
      width: 100px;
    }
    
    .qty-pill {
      border: 1px solid #E5E5E5;
      border-radius: 30px;
      display: inline-flex;
      align-items: center;
      padding: 3px 12px;
      gap: 10px;
      background: #FFFFFF;
      box-shadow: 0 2px 6px rgba(35, 35, 35, 0.02);
    }
    
    .qty-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #555555;
      font-weight: 700;
      padding: 0 4px;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      transition: all 0.2s ease;
    }
    
    .qty-btn:hover {
      color: #D36B50;
      background: #FAF6F2;
    }
    
    .checkout-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1.5px solid rgba(211, 107, 80, 0.1);
      padding-bottom: 20px;
      margin-bottom: 20px;
      gap: 16px;
    }
    
    .checkout-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
      margin-bottom: 0;
    }
    
    .checkout-item-img {
      width: 68px;
      height: 68px;
      border-radius: 12px;
      object-fit: contain;
      background: #FFFFFF;
      flex-shrink: 0;
      border: 1.5px solid #EAEAEA;
      box-shadow: 0 4px 12px rgba(35, 35, 35, 0.02);
    }
    
    .bundle-badge {
      background: #E8F5E9 !important;
      color: #2E7D32 !important;
      font-size: 0.75rem !important;
      font-weight: 700 !important;
      padding: 2px 8px !important;
      border-radius: 30px !important;
      display: inline-block !important;
      margin-top: 4px !important;
      width: fit-content !important;
    }
    
    .remove-btn {
      color: #D36B50;
      font-size: 0.8rem;
      text-decoration: underline;
      font-weight: 600;
      transition: color 0.2s ease;
    }
    
    .remove-btn:hover {
      color: #C2593F;
    }
  </style>
</head>
<body>

  <!-- Minimal App Navigation -->
  <nav class="checkout-nav">
    <a href="../../index.html" class="back-to-shop">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to Shop
    </a>
    <img src="../../images/logo.png" alt="RawJoy Logo" class="brand-logo">
    <div class="nav-spacer"></div> <!-- spacer -->
  </nav>

  <div class="checkout-container" id="checkout-main">
    <!-- Form Section -->
    <div class="checkout-form-section">
      <h2 style="margin-top: 0; color: #D36B50; margin-bottom: 32px; font-weight: 800; font-size: 1.75rem; letter-spacing: -0.01em; border-bottom: 1.5px solid rgba(211, 107, 80, 0.1); padding-bottom: 16px;">Shipping Information</h2>
      <form id="checkout-form">
        <div class="db-form-group">
          <label for="ship-name">Recipient Name</label>
          <input type="text" id="ship-name" class="db-form-input" required placeholder="Enter recipient name">
        </div>
        
        <div class="db-form-group">
          <label for="ship-phone">Phone Number</label>
          <input type="tel" id="ship-phone" class="db-form-input" required placeholder="Enter phone number">
        </div>

        <div class="db-form-group">
          <label for="ship-email">Email Address</label>
          <input type="email" id="ship-email" class="db-form-input" required placeholder="name@example.com">
        </div>

        <div class="db-form-group">
          <label for="ship-address">Full Delivery Address</label>
          <textarea id="ship-address" class="db-form-input" required placeholder="Street address, apartment, city, state, zip code" style="height: 110px; resize: none;"></textarea>
        </div>

        <div class="db-form-group">
          <label for="ship-notes">Order Notes (Optional)</label>
          <input type="text" id="ship-notes" class="db-form-input" placeholder="Additional instructions for courier">
        </div>

        <h3 style="margin-top: 36px; margin-bottom: 20px; color: #D36B50; font-weight: 800; font-size: 1.4rem; letter-spacing: -0.01em; border-bottom: 1.5px solid rgba(211, 107, 80, 0.1); padding-bottom: 12px;">Payment Method</h3>
        <div class="db-form-group" style="display: flex; gap: 16px; flex-wrap: wrap;">
          <label class="checkout-payment-card">
            <input type="radio" name="payment-method" value="COD" checked>
            <div>
              <strong style="font-size: 0.95rem; color: #232323;">Cash on Delivery (COD)</strong>
              <div style="font-size: 0.8rem; color: #666; font-weight: normal; margin-top: 4px; line-height: 1.4;">Pay with cash upon delivery. Easy and secure.</div>
            </div>
          </label>
          
          <label class="checkout-payment-card">
            <input type="radio" name="payment-method" value="BANK">
            <div>
              <strong style="font-size: 0.95rem; color: #232323;">Bank Transfer</strong>
              <div style="font-size: 0.8rem; color: #666; font-weight: normal; margin-top: 4px; line-height: 1.4;">Manual transfer via bank. Processed instantly.</div>
            </div>
          </label>
        </div>

        <button type="submit" class="db-btn" style="margin-top: 36px;">Place Order</button>
      </form>
    </div>

    <!-- Summary Section -->
    <div class="checkout-summary-section">
      <h3 style="margin-top: 0; margin-bottom: 24px;">Order Summary</h3>
      <div id="checkout-items-list">
        <!-- populated dynamically -->
      </div>

      <div class="checkout-totals">
        <div class="checkout-row">
          <span>Subtotal</span>
          <span id="summary-subtotal" style="font-weight: 600;">$0.00</span>
        </div>

        <div class="checkout-row">
          <span>Shipping Fee</span>
          <span id="summary-shipping" style="color: #5A7F71; font-weight: 700;">Free</span>
        </div>
        <div class="checkout-row total-row">
          <span>Total Payment</span>
          <span id="summary-total" style="color: #D36B50;">$0.00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Success Screen (Hidden by default) -->
  <div class="success-container" id="success-screen" style="display: none;">
    <div class="success-icon-wrap">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 style="margin-top: 0; color: #D36B50; font-weight: 800; font-size: 2.1rem; letter-spacing: -0.02em;">Order Successfully Placed!</h1>
    <p style="color: #666; font-size: 1.02rem; line-height: 1.6; margin-bottom: 30px;">Thank you for shopping at RawJoy. Your order is being processed.</p>
    
    <div class="success-receipt-card">
      <div class="receipt-row">
        <span>Order ID</span>
        <strong id="receipt-id">#xxxxxx</strong>
      </div>
      <div class="receipt-row">
        <span>Total Payment</span>
        <strong id="receipt-total" style="color: #D36B50; font-size: 1.15rem;">$0.00</strong>
      </div>
      <div class="receipt-row">
        <span>Payment Method</span>
        <strong id="receipt-method">COD</strong>
      </div>
    </div>
    <a href="../../index.html" class="db-btn" style="display: inline-flex; width: auto; padding: 15px 44px; margin-top: 10px;">Continue Shopping</a>
  </div>

  <!-- Logic -->
  <script src="../../js/cart-interceptor.js"></script>
  <script type="module">
    import { DB } from '../../js/db-bridge.js';

    async function renderCheckoutPage() {
      // 1. Get cart items
      const cart = await DB.cart.get();
      if (cart.items.length === 0) {
        // If order was already successfully placed and cart is empty,
        // or if they navigated back to an empty checkout, redirect.
        if (document.getElementById('success-screen').style.display !== 'block') {
          alert('Your cart is empty!');
          window.location.href = '../../index.html';
        }
        return;
      }

      // 2. Load current user details if logged in
      const user = DB.auth.getCurrentUser();
      if (user) {
        if (!document.getElementById('ship-email').value) {
          document.getElementById('ship-email').value = user.email || '';
        }
        const profile = await DB.auth.getProfile(user.uid);
        if (profile.success) {
          if (!document.getElementById('ship-name').value) {
            document.getElementById('ship-name').value = profile.data.name || user.displayName || '';
          }
          if (!document.getElementById('ship-phone').value) {
            document.getElementById('ship-phone').value = profile.data.phone || '';
          }
          if (!document.getElementById('ship-address').value) {
            document.getElementById('ship-address').value = profile.data.address || '';
          }
        }
      }

      // 3. Render items list in summary
      const itemsContainer = document.getElementById('checkout-items-list');
      itemsContainer.innerHTML = '';
      
      let originalTotal = 0;
      cart.items.forEach(item => {
        originalTotal += item.price * item.quantity;
      });
      const finalTotal = originalTotal;

      cart.items.forEach((item, index) => {
        const itemPrice = item.price;
        const totalItemPrice = itemPrice * item.quantity;
        const totalItemPriceStr = `$${totalItemPrice.toFixed(2)}`;

        const div = document.createElement('div');
        div.className = 'checkout-item';
        
        let imgUrl = '';
        if (typeof window.getLocalProductImage === 'function') {
          imgUrl = window.getLocalProductImage(item, '../../');
        } else {
          imgUrl = item.image || '';
          if (imgUrl.indexOf('//') !== 0 && imgUrl.indexOf('http') !== 0 && imgUrl.indexOf('data:') !== 0) {
            if (imgUrl.indexOf('images/') !== 0 && imgUrl.indexOf('cdn/') !== 0) {
              imgUrl = 'images/' + imgUrl;
            }
            imgUrl = '../../' + imgUrl;
          }
        }
        
        div.innerHTML = `
          <img src="${imgUrl}" alt="${item.name}" class="checkout-item-img">
          <div class="checkout-item-details" style="flex: 1;">
            <strong style="display: block; font-size: 0.95rem; line-height: 1.3;">${item.name}</strong>
            ${item.variant ? `<span style="font-size: 0.8rem; color: #666; display: block; margin-top: 2px;">Variant: ${item.variant}</span>` : ''}
            <div style="display: flex; align-items: center; gap: 12px; margin-top: 10px;">
              <div class="qty-pill">
                <button type="button" class="qty-btn" onclick="updateCheckoutQty(${index + 1}, ${item.quantity - 1})">-</button>
                <span style="font-size: 0.85rem; font-weight: 700; color: #232323;">${item.quantity}</span>
                <button type="button" class="qty-btn" onclick="updateCheckoutQty(${index + 1}, ${item.quantity + 1})">+</button>
              </div>
              <a href="#" class="remove-btn" onclick="updateCheckoutQty(${index + 1}, 0); return false;">Remove</a>
            </div>
          </div>
          <div style="font-weight: 700; font-size: 1rem; text-align: right; min-width: 80px; color: #232323;">
            <span>${totalItemPriceStr}</span>
          </div>
        `;
        itemsContainer.appendChild(div);
      });

      // 4. Update totals
      const originalTotalStr = `$${originalTotal.toFixed(2)}`;
      const finalTotalStr = `$${finalTotal.toFixed(2)}`;

      document.getElementById('summary-subtotal').textContent = originalTotalStr;
      document.getElementById('summary-total').textContent = finalTotalStr;
    }

    // Expose updateCheckoutQty to window so inline onclick handlers can call it
    window.updateCheckoutQty = async (line, newQty) => {
      const cart = await DB.cart.get();
      if (line && cart.items[line - 1]) {
        const targetItem = cart.items[line - 1];
        await DB.cart.update(targetItem.productId, newQty, targetItem.variant);
        renderCheckoutPage();
      }
    };

    document.addEventListener('DOMContentLoaded', () => {
      renderCheckoutPage();

      // Submit Form (Place Order)
      document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const name = document.getElementById('ship-name').value;
        const phone = document.getElementById('ship-phone').value;
        const email = document.getElementById('ship-email').value;
        const address = document.getElementById('ship-address').value;
        const notes = document.getElementById('ship-notes').value;
        const method = document.querySelector('input[name="payment-method"]:checked').value;

        // Get fresh cart data at submit time
        const cart = await DB.cart.get();
        if (cart.items.length === 0) {
          alert('Your cart is empty!');
          return;
        }

        const subtotal = cart.total;
        const subtotalStr = `$${subtotal.toFixed(2)}`;

        const orderData = {
          items: cart.items,
          subtotal: subtotal,
          shipping: 0,
          total: subtotal,
          shippingAddress: `${name}, ${phone}, ${address}`,
          paymentMethod: method,
          notes: notes
        };

        const res = await DB.orders.create(orderData);
        if (res.success) {
          // Clear cart drawer and DB
          await DB.cart.clear();

          // Clear cart drawer UI counts
          document.querySelectorAll('.cart-bubble__text-count').forEach(el => el.textContent = '0');
          document.querySelectorAll('cart-count').forEach(c => c.classList.add('hidden'));

          // Display success page
          document.getElementById('checkout-main').style.display = 'none';
          document.getElementById('receipt-id').textContent = '#' + res.orderId.slice(-6).toUpperCase();
          document.getElementById('success-screen').querySelector('#receipt-total').textContent = subtotalStr;
          document.getElementById('success-screen').querySelector('#receipt-method').textContent = method === 'COD' ? 'Cash on Delivery (COD)' : 'Bank Transfer';
          document.getElementById('success-screen').style.display = 'block';
        } else {
          alert('Failed to place order: ' + res.error);
        }
      });
    });

    window.addEventListener('pageshow', (event) => {
      console.log('[Checkout] pageshow triggered, persisted:', event.persisted);
      renderCheckoutPage();
    });
  </script>
</body>
</html>
